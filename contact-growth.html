<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Growth — Teams Reporting Hub</title>
<style>
  :root { --bg: #0f172a; --card-bg: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --border: #334155; --accent: #60a5fa; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; }
  .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--accent); text-decoration: none; font-size: 0.9rem; margin-bottom: 2rem; transition: all 0.2s; }
  .back-link:hover { gap: 0.75rem; }
  .container { max-width: 1000px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 2px solid var(--border); }
  .phase-badge { display: inline-block; background: #dcfce7; color: #166534; font-size: 0.75rem; padding: 0.35rem 0.85rem; border-radius: 2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
  header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
  header .subtitle { font-size: 1.1rem; color: var(--muted); }
  .coming-soon { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 3rem 2rem; text-align: center; }
  .coming-soon-icon { font-size: 4rem; margin-bottom: 1.5rem; }
  .coming-soon h2 { font-size: 1.5rem; margin-bottom: 1rem; }
  .coming-soon p { color: var(--muted); max-width: 600px; margin: 0 auto; line-height: 1.7; }
</style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← Back to Hub</a>
  <header>
    <div class="phase-badge">Phase 2 • Q2 2026</div>
    <h1>📊 Contact Growth</h1>
    <p class="subtitle">List growth roll-ups and audience health tracking</p>
  </header>
  <div class="coming-soon">
    <div class="coming-soon-icon">🚧</div>
    <h2>Page Under Construction</h2>
    <p>Detailed requirements and implementation plans coming soon.</p>
  </div>
</div>
</body>
</html>
